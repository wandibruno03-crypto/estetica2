<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica Estética</title>
  <link rel="icon" type="image/svg+xml" href="assets/imagens/favicon.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <header>
    <div class="logo-container">
      <img src="assets/imagens/massagem.gif" alt="Logo" class="logo">
      <span class="logo-text">Estética & Beleza</span>
    </div>
    <button class="contato-btn" onclick="contatoAlert()">CONTATO</button>
  </header>

  <!-- Galeria 1 -->
  <div class="galeria-modal" id="galeria-limpeza">
    <button class="galeria-close" onclick="fecharGaleria('galeria-limpeza')">&times;</button>
    <div class="swipe-arrow-gal swipe-left-gal" onclick="galPrev('galeria-limpeza')"><i class="fas fa-chevron-left"></i>
    </div>
    <div class="swipe-arrow-gal swipe-right-gal" onclick="galNext('galeria-limpeza')"><i
        class="fas fa-chevron-right"></i></div>
    <div class="galeria-track">
      <img src="assets/imagens/limpeza.jpg" class="galeria-item">
      <img src="assets/imagens/limpeza2.jpg" class="galeria-item">
      <img src="assets/imagens/limpeza3.jpg" class="galeria-item">
    </div>
    <div class="galeria-counter"></div>
  </div>

  <!-- Galeria 2 -->
  <div class="galeria-modal" id="galeria-botox">
    <button class="galeria-close" onclick="fecharGaleria('galeria-botox')">&times;</button>
    <div class="swipe-arrow-gal swipe-left-gal" onclick="galPrev('galeria-botox')"><i class="fas fa-chevron-left"></i>
    </div>
    <div class="swipe-arrow-gal swipe-right-gal" onclick="galNext('galeria-botox')"><i class="fas fa-chevron-right"></i>
    </div>
    <div class="galeria-track">
      <img src="assets/imagens/botox.jpg" class="galeria-item">
      <img src="assets/imagens/botox2.jpg" class="galeria-item">
      <img src="assets/imagens/botox3.jpg" class="galeria-item">
    </div>
    <div class="galeria-counter"></div>
  </div>

  <!-- Galeria 3 -->
  <div class="galeria-modal" id="galeria-preenchimento">
    <button class="galeria-close" onclick="fecharGaleria('galeria-preenchimento')">&times;</button>
    <div class="swipe-arrow-gal swipe-left-gal" onclick="galPrev('galeria-preenchimento')"><i
        class="fas fa-chevron-left"></i></div>
    <div class="swipe-arrow-gal swipe-right-gal" onclick="galNext('galeria-preenchimento')"><i
        class="fas fa-chevron-right"></i></div>
    <div class="galeria-track">
      <img src="assets/imagens/preechimento.jpg" class="galeria-item">
      <img src="assets/imagens/preenchimento2.jpg" class="galeria-item">
      <img src="assets/imagens/preenchimento3.jpg" class="galeria-item">
    </div>
    <div class="galeria-counter"></div>
  </div>

  <!-- Galeria 4 -->
  <div class="galeria-modal" id="galeria-lipo">
    <button class="galeria-close" onclick="fecharGaleria('galeria-lipo')">&times;</button>
    <div class="swipe-arrow-gal swipe-left-gal" onclick="galPrev('galeria-lipo')"><i class="fas fa-chevron-left"></i>
    </div>
    <div class="swipe-arrow-gal swipe-right-gal" onclick="galNext('galeria-lipo')"><i class="fas fa-chevron-right"></i>
    </div>
    <div class="galeria-track">
      <img src="assets/imagens/lipo.jpg" class="galeria-item">
      <img src="assets/imagens/lipo2.jpg" class="galeria-item">
      <img src="assets/imagens/lipo3.jpg" class="galeria-item">
    </div>
    <div class="galeria-counter"></div>
  </div>

  <!-- Galeria 5 -->
  <div class="galeria-modal" id="galeria-sobrancelha">
    <button class="galeria-close" onclick="fecharGaleria('galeria-sobrancelha')">&times;</button>
    <div class="swipe-arrow-gal swipe-left-gal" onclick="galPrev('galeria-sobrancelha')"><i
        class="fas fa-chevron-left"></i></div>
    <div class="swipe-arrow-gal swipe-right-gal" onclick="galNext('galeria-sobrancelha')"><i
        class="fas fa-chevron-right"></i></div>
    <div class="galeria-track">
      <img src="assets/imagens/sobrancelha.jpg" class="galeria-item">
      <img src="assets/imagens/sobrancelha2.jpg" class="galeria-item">
      <img src="assets/imagens/sobrancelha3.jpg" class="galeria-item">
    </div>
    <div class="galeria-counter"></div>
  </div>

  <!-- Vídeos -->
  <main class="videos-wrapper" id="videosWrapper">
    <section class="video-section" data-theme="pink">
      <video autoplay muted loop playsinline>
        <source src="assets/imagens/massagem.mp4" type="video/mp4">
      </video>
      <div class="video-overlay">
        <h2>Limpeza de Pele</h2>
        <button class="cta-btn" onclick="abrirGaleria('galeria-limpeza')">Ver Galeria</button>
      </div>
    </section>

    <section class="video-section" data-theme="gold">
      <video autoplay muted loop playsinline>
        <source src="assets/imagens/botox.mp4" type="video/mp4">
      </video>
      <div class="video-overlay">
        <h2>Botox</h2>
        <button class="cta-btn" onclick="abrirGaleria('galeria-botox')">Ver Galeria</button>
      </div>
    </section>

    <section class="video-section" data-theme="lilac">
      <video autoplay muted loop playsinline>
        <source src="assets/imagens/preenchimento.mp4" type="video/mp4">
      </video>
      <div class="video-overlay">
        <h2>Preenchimento</h2>
        <button class="cta-btn" onclick="abrirGaleria('galeria-preenchimento')">Ver Galeria</button>
      </div>
    </section>

    <section class="video-section" data-theme="mint">
      <video autoplay muted loop playsinline>
        <source src="assets/imagens/lipo.mp4" type="video/mp4">
      </video>
      <div class="video-overlay">
        <h2>Lipo Laser</h2>
        <button class="cta-btn" onclick="abrirGaleria('galeria-lipo')">Ver Galeria</button>
      </div>
    </section>

    <section class="video-section" data-theme="rose">
      <video autoplay muted loop playsinline>
        <source src="assets/imagens/sobrancelha2.mp4" type="video/mp4">
      </video>
      <div class="video-overlay">
        <h2>Design de Sobrancelhas</h2>
        <button class="cta-btn" onclick="abrirGaleria('galeria-sobrancelha')">Ver Galeria</button>
      </div>
    </section>
  </main>

  <div class="swipe-left" onclick="goToSection(currentSection - 1)"><i class="fas fa-chevron-left"></i></div>
  <div class="swipe-right" onclick="goToSection(currentSection + 1)"><i class="fas fa-chevron-right"></i></div>

  <footer class="footer" id="footer">
    <div class="footer-icons">
      <a href="https://wa.me/5511930164939"><img src="assets/imagens/whatsapp (1).png" alt="WhatsApp"></a>
      <a href="#"><img src="assets/imagens/instagram (1).png" alt="Instagram"></a>
      <a href="#"><img src="assets/imagens/facebook.png" alt="Facebook"></a>
      <a href="#"><img src="assets/imagens/mapa.png" alt="Maps"></a>
    </div>
    <p>&copy; 2026 Estética & Beleza</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
